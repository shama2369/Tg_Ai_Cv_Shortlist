# Railway: one service — Python API + Vite admin UI (one URL)
# Use the Python provider so pip/venv are set up automatically (do not override install).
providers = ["python"]

[variables]
NIXPACKS_PYTHON_VERSION = "3.12"

# Node only for building admin-ui (package.json is in admin-ui/, not repo root)
[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.build]
cmds = [
  "cd admin-ui && npm ci && VITE_API_BASE= npm run build",
]

[start]
cmd = "uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8080}"
