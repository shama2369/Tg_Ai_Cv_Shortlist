# Railway: build React UI + Python API (one service, one URL)
[phases.setup]
nixPkgs = ["python312", "nodejs_20"]

[phases.install]
cmds = [
  "pip install -r requirements.txt",
  "cd admin-ui && npm ci && VITE_API_BASE= npm run build",
]

[start]
cmd = "uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8080}"
